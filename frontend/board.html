<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpoNotes · Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/board.css"/>
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-left">
      <button id="back-btn" class="btn btn-ghost">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Boards
      </button>
      <h1 id="board-title" class="board-title">Loading...</h1>
    </div>
    <div class="top-bar-right">
      <span id="role-badge" class="badge"></span>
      <button id="logout-btn" class="btn btn-ghost">Log out</button>
    </div>
  </header>
  <main id="board-container" class="board-scroll">
    <!-- колонки -->
  </main>

  <!-- Модальное окно (создание колонки/карточки) -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Column</h3>
        <button class="btn btn-icon" id="modal-close-btn">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body">
        <label class="label">Title</label>
        <input class="input-field" id="modal-input" placeholder="Enter title"/>
      </div>
      <div class="flex-row" style="justify-content: flex-end; margin-top:1.5rem;">
        <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn" id="modal-action-btn">Create</button>
      </div>
    </div>
  </div>

  <script src="scripts/config.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/board.js"></script>
</body>
</html>

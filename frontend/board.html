<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpoNotes · Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/board.css"/>
  <link rel="stylesheet" href="styles/card-detail.css"/>
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-left">
      <button id="back-btn" class="btn btn-ghost">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Boards
      </button>
      <h1 id="board-title" class="board-title">Loading...</h1>
    </div>
    <div class="top-bar-right">
      <span id="role-badge" class="badge"></span>
      <button id="logout-btn" class="btn btn-ghost">Log out</button>
    </div>
  </header>
  <main id="board-container" class="board-scroll">
    <!-- колонки -->
  </main>

  <!-- Модальное окно создания колонки/карточки -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Column</h3>
        <button class="btn btn-icon" id="modal-close-btn">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body">
        <label class="label">Title</label>
        <input class="input-field" id="modal-input" placeholder="Enter title"/>
      </div>
      <div class="flex-row" style="justify-content: flex-end; margin-top:1.5rem;">
        <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn" id="modal-action-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно деталей карточки -->
  <div id="card-detail-overlay" class="modal-overlay" style="display:none;">
    <div class="modal card-detail-modal">
      <div class="modal-header">
        <h3 id="card-detail-title">Card Details</h3>
        <button class="btn btn-icon" id="card-detail-close-btn">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="card-detail-body">
        <!-- Поля карточки -->
        <div id="card-fields">
          <label class="label">Title</label>
          <input class="input-field" id="edit-card-title" disabled/>
          <label class="label">Description</label>
          <textarea class="input-field" id="edit-card-desc" rows="3" disabled></textarea>
          <div class="flex-row mt-1">
            <div style="flex:1">
              <label class="label">Priority</label>
              <select class="input-field" id="edit-card-priority" disabled>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div style="flex:1">
              <label class="label">Due date</label>
              <input type="datetime-local" class="input-field" id="edit-card-due" disabled/>
            </div>
          </div>
          <div class="flex-row" style="justify-content: flex-end; margin-top:1rem;">
            <button class="btn btn-ghost" id="card-cancel-edit-btn" style="display:none;">Cancel</button>
            <button class="btn" id="card-save-btn" style="display:none;">Save</button>
            <button class="btn" id="card-edit-btn">Edit</button>
          </div>
        </div>

        <hr>

        <!-- Комментарии -->
        <h4>Comments</h4>
        <div id="comments-container"></div>
        <div id="comments-pagination" class="flex-row" style="justify-content:center;"></div>
        <div class="mt-1">
          <textarea class="input-field" id="new-comment-text" rows="2" placeholder="Write a comment..."></textarea>
          <button class="btn mt-1" id="add-comment-btn">Add Comment</button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/config.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/board.js"></script>
  <script src="scripts/card.js"></script>
</body>
</html>

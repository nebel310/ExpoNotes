            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /audit-log/:
    get:
      tags: [Audit Log]
      summary: Получить список записей аудита с фильтрацией и пагинацией
      security:
        - Bearer: []
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [board, column, card, comment, file, board_member]
        - name: entity_id
          in: query
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: string
        - name: direction
          in: query
          schema:
            type: string
            enum: [after, before]
            default: after
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Список записей аудита
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogListResponse" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /audit-log/{log_id}:
    get:
      tags: [Audit Log]
      summary: Получить запись аудита по ID
      security:
        - Bearer: []
      parameters:
        - name: log_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Данные записи
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogResponse" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Запись не найдена
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }